<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#11213f" />
    <title>SnowTab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <canvas id="snow-canvas" aria-hidden="true"></canvas>

    <main class="app-shell">
      <section class="hero-card glass-card">
        <div class="hero-topline">
          <div>
            <p class="eyebrow">SnowTab</p>
            <h1 id="clock">00:00</h1>
            <p id="date-line" class="muted">Loading today...</p>
          </div>

          <div class="theme-picker" aria-label="Theme picker">
            <button class="theme-dot" data-theme-button="frost" aria-label="Use frost theme"></button>
            <button class="theme-dot" data-theme-button="cocoa" aria-label="Use cocoa theme"></button>
            <button class="theme-dot" data-theme-button="aurora" aria-label="Use aurora theme"></button>
          </div>
        </div>

        <form id="search-form" class="search-box" autocomplete="off">
          <label class="sr-only" for="search-input">Search the web</label>
          <input id="search-input" type="search" placeholder="Search the web or paste a URL" />
          <button type="submit">Search</button>
        </form>

        <div class="hero-grid">
          <article class="mini-panel countdown-panel">
            <span class="panel-label">Christmas countdown</span>
            <strong id="countdown-days">...</strong>
            <span id="countdown-label">days left</span>
          </article>
          <article class="mini-panel quote-panel">
            <span class="panel-label">Today</span>
            <p id="daily-message">Make the page feel cozy, then lock in.</p>
          </article>
        </div>
      </section>

      <section class="content-grid">
        <article class="glass-card timer-card">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Focus timer</p>
              <h2 id="timer-mode-title">Focus</h2>
            </div>
            <span id="session-pill" class="pill">0 sessions today</span>
          </div>

          <div class="timer-ring" aria-live="polite">
            <svg viewBox="0 0 220 220" role="img" aria-label="Timer progress">
              <circle class="ring-bg" cx="110" cy="110" r="96"></circle>
              <circle id="timer-progress" class="ring-progress" cx="110" cy="110" r="96"></circle>
            </svg>
            <div class="timer-readout">
              <span id="timer-display">25:00</span>
              <small id="timer-subtitle">Ready when you are</small>
            </div>
          </div>

          <div class="timer-controls">
            <button id="start-pause" class="primary-button">Start</button>
            <button id="reset-timer" class="soft-button">Reset</button>
            <button id="skip-mode" class="soft-button">Skip</button>
          </div>

          <div class="mode-tabs" role="tablist" aria-label="Timer modes">
            <button class="mode-tab active" data-mode="focus">Focus</button>
            <button class="mode-tab" data-mode="short">Short break</button>
            <button class="mode-tab" data-mode="long">Long break</button>
          </div>

          <details class="settings-box">
            <summary>Timer settings</summary>
            <div class="settings-grid">
              <label>
                Focus minutes
                <input id="focus-minutes" type="number" min="1" max="180" value="25">
              </label>
              <label>
                Short break
                <input id="short-minutes" type="number" min="1" max="60" value="5">
              </label>
              <label>
                Long break
                <input id="long-minutes" type="number" min="1" max="90" value="15">
              </label>
              <label class="toggle-label">
                <input id="sound-toggle" type="checkbox" checked>
                Sound alert
              </label>
            </div>
          </details>
        </article>

        <article class="glass-card links-card">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Quick links</p>
              <h2>Launch pad</h2>
            </div>
            <button id="add-link" class="soft-button small-button">Add link</button>
          </div>

          <div id="quick-links" class="quick-links" aria-live="polite"></div>
        </article>
      </section>
    </main>

    <dialog id="link-dialog" class="link-dialog">
      <form id="link-form" method="dialog">
        <div class="dialog-heading">
          <h2 id="dialog-title">Add link</h2>
          <button type="button" id="close-dialog" class="icon-button" aria-label="Close dialog">×</button>
        </div>
        <input type="hidden" id="editing-index" value="">
        <label>
          Name
          <input id="link-name" required maxlength="24" placeholder="GitHub">
        </label>
        <label>
          URL
          <input id="link-url" required placeholder="https://github.com">
        </label>
        <div class="dialog-actions">
          <button type="button" id="delete-link" class="danger-button">Delete</button>
          <button type="submit" class="primary-button">Save</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
