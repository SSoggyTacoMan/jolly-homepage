<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d2f29" />
    <title>SnowTab</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <canvas id="snow-canvas" aria-hidden="true"></canvas>
    <div id="light-string" aria-hidden="true"></div>

    <main class="shell">
      <header class="site-header">
        <a class="brand" href="./" aria-label="SnowTab home">
          <span class="brand-mark" aria-hidden="true">
            <img src="./favicon.svg" alt="" aria-hidden="true" width="64" height="64" />
          </span>
          <span class="brand-copy">
            <strong>SnowTab</strong>
          </span>
        </a>
        <button id="settings-open" class="button ghost" type="button">Settings</button>
      </header>

      <section class="hero-grid" aria-label="Main controls">
        <article class="panel clock-panel">
          <div id="clock" class="clock" aria-live="polite">00:00:00</div>
          <div id="date-line" class="date-line">Monday, 29 June 2026</div>
        </article>

        <article class="panel search-panel">
          <form id="search-form" class="search-form" autocomplete="off">
            <label class="sr-only" for="search-input">Search the web</label>
            <input id="search-input" type="search" />
            <button type="submit" class="button primary">Search</button>
          </form>
        </article>

        <article class="panel countdown-panel">
          <div class="countdown-number"><span id="countdown-days">...</span></div>
          <strong>sleeps left</strong>
          <div class="candy-progress" aria-hidden="true"><span id="countdown-fill"></span></div>
        </article>
      </section>

      <section class="workspace-grid">
        <section class="left-stack">
          <article class="panel launchpad-panel">
            <div class="section-head">
              <div>
                <h2>Links</h2>
              </div>
              <button id="add-link" class="button ghost" type="button">Add link</button>
            </div>
            <div id="quick-links" class="quick-links" aria-live="polite"></div>
          </article>

          <article class="panel notes-panel">
            <div class="section-head compact">
              <div>
                <h2>Notes</h2>
              </div>
              <button id="clear-note" class="button ghost small" type="button">Clear</button>
            </div>
            <textarea id="scratch-pad" rows="5" placeholder="Write anything you need to remember..."></textarea>
          </article>
        </section>

        <aside class="right-stack">
          <article class="panel timer-panel">
            <div class="section-head compact">
              <div>
                <h2 id="timer-mode-title">Timer</h2>
              </div>
              <span id="session-pill" class="pill">0 sessions</span>
            </div>

            <div class="task-strip">
              <span>Current task</span>
              <strong id="current-task-title">No task selected</strong>
            </div>

            <div class="timer-box">
              <div id="timer-display" class="timer-display">25:00</div>
              <div id="timer-subtitle" class="timer-subtitle">Ready</div>
              <div class="timer-bar" aria-hidden="true"><span id="timer-progress"></span></div>
            </div>

            <div class="segmented" aria-label="Timer mode">
              <button class="mode-tab active" data-mode="focus" type="button">Focus</button>
              <button class="mode-tab" data-mode="break" type="button">Break</button>
            </div>

            <div class="timer-controls">
              <button id="start-pause" class="button primary" type="button">Start</button>
              <button id="reset-timer" class="button ghost" type="button">Reset</button>
            </div>
          </article>

          <article class="panel todo-panel">
            <div class="section-head compact">
              <div>
                <h2>Tasks</h2>
              </div>
              <span id="todo-count" class="pill">0 open</span>
            </div>

            <form id="todo-form" class="todo-form" autocomplete="off">
              <label class="sr-only" for="todo-input">Add a task</label>
              <input id="todo-input" maxlength="90" placeholder="Add a task" />
              <button type="submit" class="button primary">Add</button>
            </form>

            <div class="todo-tabs" aria-label="Todo filters">
              <button class="filter-button active" data-filter="open" type="button">Open</button>
              <button class="filter-button" data-filter="all" type="button">All</button>
              <button class="filter-button" data-filter="done" type="button">Done</button>
              <button id="clear-done" class="button ghost small" type="button">Clear done</button>
            </div>

            <div id="todo-list" class="todo-list" aria-live="polite"></div>
          </article>
        </aside>
      </section>
    </main>

    <dialog id="settings-dialog" class="settings-dialog">
      <form id="settings-form" method="dialog" class="settings-form">
        <div class="dialog-head">
          <div>
            <p class="label">Settings</p>
            <h2>SnowTab settings</h2>
          </div>
          <button id="settings-close" class="icon-button" type="button" aria-label="Close settings">×</button>
        </div>

        <section class="settings-section">
          <h3>Search</h3>
          <label class="field">Search engine
            <select id="search-engine">
              <option value="google">Google</option>
              <option value="duckduckgo">DuckDuckGo</option>
              <option value="bing">Bing</option>
              <option value="brave">Brave</option>
              <option value="youtube">YouTube</option>
            </select>
          </label>
        </section>

        <section class="settings-section two-col">
          <div>
            <h3>Clock</h3>
            <label class="check-row"><input id="clock-seconds-toggle" type="checkbox" checked /> Show seconds</label>
            <label class="check-row"><input id="date-year-toggle" type="checkbox" checked /> Show year</label>
          </div>
          <div>
            <h3>Timer</h3>
            <div class="time-settings">
              <label>Focus min<input id="focus-minutes" type="number" min="1" max="180" value="25" /></label>
              <label>Break min<input id="break-minutes" type="number" min="1" max="90" value="5" /></label>
            </div>
          </div>
        </section>

        <section class="settings-section">
          <h3>Look</h3>
          <label class="field" style="margin-bottom: 12px;">Theme color
            <select id="accent-color">
              <option value="#e63946">Jolly Red</option>
              <option value="#f7d95f">Gold</option>
              <option value="#2a9d8f">Pine Green</option>
              <option value="#118ab2">Winter Blue</option>
            </select>
          </label>
          <div class="settings-grid">
            <label class="check-row"><input id="snow-toggle" type="checkbox" checked /> Snow</label>
            <label class="check-row"><input id="lights-toggle" type="checkbox" checked /> Lights</label>
            <label class="check-row"><input id="performance-toggle" type="checkbox" checked /> Performance mode</label>
          </div>
        </section>

        <section class="settings-section">
          <div class="wallpaper-head">
            <h3>Wallpaper</h3>
            <button id="random-wallpaper" type="button" class="button ghost small">Random</button>
          </div>
          <label class="field">Custom image URL
            <input id="custom-wallpaper-url" type="url" placeholder="https://example.com/image.jpg" />
          </label>
          <div id="wallpaper-grid" class="wallpaper-grid" aria-label="Wallpaper picker"></div>
        </section>

        <div class="dialog-actions">
          <button id="reset-settings" type="button" class="button ghost">Reset</button>
          <button id="settings-save" type="button" class="button primary">Done</button>
        </div>
      </form>
    </dialog>

    <dialog id="link-dialog" class="link-dialog">
      <form id="link-form" method="dialog" class="link-form">
        <div class="dialog-head">
          <h2 id="dialog-title">Add link</h2>
          <button id="close-dialog" class="icon-button" type="button" aria-label="Close dialog">×</button>
        </div>
        <input id="editing-index" type="hidden" value="" />
        <label class="field">Name<input id="link-name" required maxlength="24" placeholder="GitHub" /></label>
        <label class="field">URL<input id="link-url" required placeholder="https://github.com" /></label>
        <div class="dialog-actions">
          <button id="delete-link" type="button" class="button danger">Delete</button>
          <button type="submit" class="button primary">Save</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
